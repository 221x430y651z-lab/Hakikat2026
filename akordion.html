<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risale-i Nur Külliyatı Paneli</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f7f9fc;
            --border-color: #e1e8ed;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .kulliyat-konteynir {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .baslik {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            margin: 0;
            text-align: center;
            font-size: 1.5rem;
        }

        details {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        summary {
            padding: 18px 20px;
            cursor: pointer;
            font-weight: 600;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            outline: none;
            color: #34495e;
        }

        summary:hover {
            background-color: #f0f4f8;
        }

        /* Özel Ok İşareti */
        summary::after {
            content: '+';
            font-size: 1.2rem;
            color: #3498db;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            content: '−';
            transform: rotate(180deg);
        }

        details[open] {
            background-color: #fff;
        }

        .kitap-icerik {
            padding: 0 20px 20px 20px;
            background-color: #fff;
            animation: slideDown 0.3s ease-out;
        }

        .oku-butonu {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .oku-butonu:hover {
            background-color: #2980b9;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="kulliyat-konteynir">
    <h1 class="baslik">Risale-i Nur Külliyatı</h1>
    <div id="kitap-listesi"></div>
</div>

<script>
    // Kitap dosyaları ve görünen isimleri eşleştirelim
    const kitapVerisi = [
        { dosya: "sozler.html", ad: "Sözler" },
        { dosya: "mektubat1.html", ad: "Mektubat - 1" },
        { dosya: "mektubat2.html", ad: "Mektubat - 2" },
        { dosya: "lemalar.html", ad: "Lem'alar" },
        { dosya: "sualar1.html", ad: "Şualar - 1" },
        { dosya: "sualar2.html", ad: "Şualar - 2" },
        { dosya: "siracunnur.html", ad: "Siracü'n-Nur" },
        { dosya: "zulfikar.html", ad: "Zülfikar" },
        { dosya: "asayimusa.html", ad: "Asâ-yı Musa" },
        { dosya: "tilsimlar.html", ad: "Tılsımlar" },
        { dosya: "isaratulicaz.html", ad: "İşaratü'l-İ'caz" },
        { dosya: "mesnevinuriye.html", ad: "Mesnevi-i Nuriye" },
        { dosya: "stgaybi.html", ad: "Sikke-i Tasdik-i Gaybi" },
        { dosya: "barla.html", ad: "Barla Lahikası" },
        { dosya: "kastamonu.html", ad: "Kastamonu Lahikası" },
        { dosya: "emirdag1.html", ad: "Emirdağ Lahikası - 1" },
        { dosya: "emirdag2.html", ad: "Emirdağ Lahikası - 2" },
        { dosya: "emirdag3.html", ad: "Emirdağ Lahikası - 3" },
        { dosya: "emirdag4.html", ad: "Emirdağ Lahikası - 4" },
        { dosya: "hanimlar.html", ad: "Hanımlar Rehberi" },
        { dosya: "genclik.html", ad: "Gençlik Rehberi" },
        { dosya: "muhakemat.html", ad: "Muhakemat" },
        { dosya: "nurunilkkapisi.html", ad: "Nurun İlk Kapısı" }
    ];

    const listeKonteynir = document.getElementById('kitap-listesi');

    kitapVerisi.forEach(kitap => {
        const details = document.createElement('details');
        
        details.innerHTML = `
            <summary>${kitap.ad}</summary>
            <div class="kitap-icerik">
                <p>${kitap.ad} eserini okumak için aşağıdaki butona tıklayın.</p>
                <a href="${kitap.dosya}" class="oku-butonu">Kitabı Aç</a>
            </div>
        `;

        // AKORDEON ÖZELLİĞİ: Biri açılınca diğerlerini kapat
        details.addEventListener('toggle', function() {
            if (this.open) {
                document.querySelectorAll('details').forEach(d => {
                    if (d !== this) d.removeAttribute('open');
                });
            }
        });

        listeKonteynir.appendChild(details);
    });
</script>

</body>
</html>
