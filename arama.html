<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Külliyat Detaylı Arama</title>
    <script src="fihrist.js"></script> 
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 10px; margin: 0; }
        
        /* BURAYI DÜZENLEDİM: Laptopta çok geniş olmasın diye max-width ve ortalama eklendi */
        .panel { 
            background: #2c3e50; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            max-width: 600px; /* Laptopta genişliği sınırlar */
            margin: 0 auto;   /* Ortada durmasını sağlar */
        }
        
        input { width: 100%; padding: 15px; font-size: 20px; border-radius: 30px; border: none; outline: none; }
        .skor { font-size: 18px; color: #f1c40f; margin-top: 15px; font-weight: bold; line-height: 1.4; }
        #sonuclar { margin-top: 20px; width: 100%; }
        .satir { 
            background: white; margin: 10px auto; padding: 15px; width: 100%; max-width: 600px;
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .satir:hover { background: #e8f4fd; }
        .kitap-ad { font-weight: bold; color: #333; text-align: left; }
        .detay-yazi { font-size: 13px; color: #7f8c8d; text-align: left; margin-top: 4px; }
        .sayi { color: #2980b9; font-weight: bold; margin-left: 10px; min-width: 40px; text-align: right; }
    </style>
</head>
<body>

<div class="panel">
    <input type="text" id="aramaKutusu" placeholder="Kelimeleri boşlukla yaz abi..." oninput="ara()">
    <div id="toplam" class="skor">Toplam: 0</div>
</div>

<div id="sonuclar"></div>

<script>
const kitapListesi = [
    "sozler.html", "mektubat1.html", "mektubat2.html", "lemalar.html",
    "sualar1.html", "sualar2.html", "siracunnur.html", "zulfikar.html",
    "asayimusa.html", "tilsimlar.html", "isaratulicaz.html", "mesnevinuriye.html",
    "stgaybi.html", "barla.html", "kastamonu.html", "emirdag1.html",
    "emirdag2.html", "emirdag3.html", "emirdag4.html", "hanimlar.html",
    "genclik.html", "muhakemat.html", "nurunilkkapisi.html"
];

function ara() {
    let arananTam = document.getElementById('aramaKutusu').value.toLocaleLowerCase('tr-TR').trim();
    let kelimeler = arananTam.split(/\s+/).filter(k => k.length >= 2);
    let divSonuc = document.getElementById('sonuclar');
    let divToplam = document.getElementById('toplam');
    
    divSonuc.innerHTML = "";
    let kitapDetaylari = {}; 
    let genelKelimeToplamlari = {};

    if (kelimeler.length === 0) {
        divToplam.innerText = "Toplam: 0";
        return;
    }

    kelimeler.forEach(k => genelKelimeToplamlari[k] = 0);

    for (let anahtar in fihrist) {
        let kucukAnahtar = anahtar.toLocaleLowerCase('tr-TR');

        kelimeler.forEach(kelime => {
            if (kucukAnahtar.startsWith(kelime)) {
                for (let kitap in fihrist[anahtar]) {
                    if (!kitapDetaylari[kitap]) kitapDetaylari[kitap] = {};
                    if (!kitapDetaylari[kitap][kelime]) kitapDetaylari[kitap][kelime] = 0;
                    
                    let adet = fihrist[anahtar][kitap];
                    kitapDetaylari[kitap][kelime] += adet;
                    genelKelimeToplamlari[kelime] += adet;
                }
            }
        });
    }

    kitapListesi.forEach(kitap => {
        if (kitapDetaylari[kitap]) {
            let ad = kitap.replace(".html", "").toUpperCase();
            let detayYazisi = "";
            let kitapToplami = 0;

            for (let kelime in kitapDetaylari[kitap]) {
                let sayi = kitapDetaylari[kitap][kelime];
                detayYazisi += `${kelime}: ${sayi} | `;
                kitapToplami += sayi;
            }

            divSonuc.innerHTML += `
                <div class="satir" onclick="window.location.href='${kitap}?ara=${encodeURIComponent(arananTam)}'">
                    <div>
                        <div class="kitap-ad">${ad}</div>
                        <div class="detay-yazi">${detayYazisi.slice(0, -3)}</div>
                    </div>
                    <span class="sayi">${kitapToplami}</span>
                </div>`;
        }
    });

    let genelYazi = "";
    for (let kelime in genelKelimeToplamlari) {
        genelYazi += `${kelime} (${genelKelimeToplamlari[kelime]})  `;
    }
    divToplam.innerText = genelYazi || "Toplam: 0";
}
</script>
<script src="kulliyat_sistem.js"></script>
</body>
</html>
