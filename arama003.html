<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Külliyat Arama</title>
    <script src="fihrist.js"></script> 
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; margin: 0; padding: 10px; }
        
        /* Ana Panel */
        .ust-alan { background: #2c3e50; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); max-width: 700px; margin: 0 auto; position: sticky; top: 10px; z-index: 100; }
        .arama-grup { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 15px; font-size: 18px; border-radius: 30px; border: none; outline: none; }
        
        .filtre-btn { background: #f1c40f; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #2c3e50; white-space: nowrap; }

        .skor { font-size: 20px; color: #f1c40f; margin-top: 15px; font-weight: bold; }

        /* Yandan Açılır Menü (Drawer) */
        .yan-menu {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: #34495e; color: white; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s; z-index: 1000; padding: 20px; text-align: left;
            overflow-y: auto;
        }
        .yan-menu.acik { right: 0; }
        .menu-baslik { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5d6d7e; padding-bottom: 10px; margin-bottom: 15px; }
        .kapat-btn { background: #e74c3c; color: white; border: none; padding: 5px 15px; border-radius: 10px; cursor: pointer; }

        /* Kitap Listesi Tasarımı */
        .kitap-secim label { 
            display: flex; align-items: center; gap: 10px; padding: 10px;
            background: rgba(255,255,255,0.1); border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 14px;
        }
        .kitap-secim label:hover { background: rgba(255,255,255,0.2); }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f1c40f; }

        /* Arka Karartma */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
        .overlay.aktif { display: block; }

        /* Sonuçlar */
        #sonuclar { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .satir { 
            background: white; margin: 8px auto; padding: 15px 20px; width: 100%; max-width: 600px;
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .satir:hover { background: #e8f4fd; }
        .kitap-ad { font-weight: bold; color: #333; }
        .sayi { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>

<div class="ust-alan">
    <div class="arama-grup">
        <input type="text" id="aramaKutusu" placeholder="Aramaya başla..." oninput="ara()">
        <button class="filtre-btn" onclick="menuAc()">📚 Kitap Seç</button>
    </div>
    <div id="toplam" class="skor">Toplam: 0</div>
</div>

<div id="overlay" class="overlay" onclick="menuKapat()"></div>

<div id="yanMenu" class="yan-menu">
    <div class="menu-baslik">
        <span>Kitap Filtresi</span>
        <button class="kapat-btn" onclick="menuKapat()">Kapat</button>
    </div>
    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold;"><input type="checkbox" id="hepsiniSec" checked onclick="tumunuToggle(this)"> TÜMÜNÜ SEÇ</label>
    </div>
    <div id="kitapSecimListesi" class="kitap-secim"></div>
</div>

<div id="sonuclar"></div>

<script>
const kitapListesi = [
    "sozler.html", "mektubat1.html", "mektubat2.html", "lemalar.html",
    "sualar1.html", "sualar2.html", "siracunnur.html", "zulfikar.html",
    "asayimusa.html", "tilsimlar.html", "isaratulicaz.html", "mesnevinuriye.html",
    "stgaybi.html", "barla.html", "kastamonu.html", "emirdag1.html",
    "emirdag2.html", "emirdag3.html", "emirdag4.html", "hanimlar.html",
    "genclik.html", "muhakemat.html", "nurunilkkapisi.html"
];

function menuAc() {
    document.getElementById('yanMenu').classList.add('acik');
    document.getElementById('overlay').classList.add('aktif');
}

function menuKapat() {
    document.getElementById('yanMenu').classList.remove('acik');
    document.getElementById('overlay').classList.remove('aktif');
}

function isimFormatla(dosya) {
    return dosya.replace(".html", "").toUpperCase().replace(/(\d+)/g, ' $1');
}

function listeyiHazirla() {
    const konteynir = document.getElementById('kitapSecimListesi');
    kitapListesi.forEach(kitap => {
        konteynir.innerHTML += `
            <label>
                <input type="checkbox" class="kitap-cb" value="${kitap}" checked onchange="filtreKontrol()"> 
                ${isimFormatla(kitap)}
            </label>`;
    });
}

function tumunuToggle(anaKaynak) {
    document.querySelectorAll('.kitap-cb').forEach(cb => cb.checked = anaKaynak.checked);
    ara();
}

function filtreKontrol() {
    const hepsi = document.querySelectorAll('.kitap-cb');
    const secili = document.querySelectorAll('.kitap-cb:checked');
    document.getElementById('hepsiniSec').checked = (hepsi.length === secili.length);
    ara();
}

function ara() {
    let aranan = document.getElementById('aramaKutusu').value.toLocaleLowerCase('tr-TR').trim();
    let divSonuc = document.getElementById('sonuclar');
    let divToplam = document.getElementById('toplam');
    const seciliKitaplar = Array.from(document.querySelectorAll('.kitap-cb:checked')).map(cb => cb.value);

    divSonuc.innerHTML = "";
    let kitapToplami = {}; 
    let genelToplam = 0;

    if (aranan.length < 2) {
        divToplam.innerText = "Toplam: 0";
        return;
    }

    for (let anahtar in fihrist) {
        if (anahtar.toLocaleLowerCase('tr-TR').startsWith(aranan)) {
            for (let kitap in fihrist[anahtar]) {
                if (seciliKitaplar.includes(kitap)) {
                    kitapToplami[kitap] = (kitapToplami[kitap] || 0) + fihrist[anahtar][kitap];
                    genelToplam += fihrist[anahtar][kitap];
                }
            }
        }
    }

    kitapListesi.forEach(kitap => {
        let adet = kitapToplami[kitap] || 0;
        if (adet > 0) {
            divSonuc.innerHTML += `
                <div class="satir" onclick="window.location.href='${kitap}?ara=${encodeURIComponent(aranan)}'">
                    <span class="kitap-ad">${isimFormatla(kitap)}</span>
                    <span class="sayi">${adet}</span>
                </div>`;
        }
    });

    divToplam.innerText = `Toplam Bulunan: ${genelToplam}`;
}

listeyiHazirla();
</script>
<script src="kulliyat_sistem.js"></script>
</body>
</html>
