<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitap Açılıyor...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; width: 100vw; position: relative; }
        iframe { width: 100%; height: 100vh; border: none; background: white; display: block; }
        
        /* SENİN ÖLÇÜLERİNE GÖRE AYARLANAN YENİ BUTON */
        .ust-kapat-btn {
            position: fixed;
            top: 145px;      /* SENİN ÖLÇÜN: 145px */
            right: 45px;     /* SENİN ÖLÇÜN: 30px */
            width: 45px;     /* SENİN ÖLÇÜN: 45px */
            height: 45px;    /* SENİN ÖLÇÜN: 45px */
            transform: translateY(50%); /* SENİN ÖLÇÜN */
            
            z-index: 999999;
            background: #d93025; /* SENİN RENGİN */
            color: white;
            border: none;
            border-radius: 50%;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Bu buton artık seninkinin tam üstüne oturacak -->
    <button class="ust-kapat-btn" onclick="window.location.href='index.html'">✕</button>

    <iframe id="pencere"></iframe>

    <script>
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const kitap = params.get('kitap');
        const miknatis = params.get('m'); 
        const kelimeler = params.get('k').split(',');

        if (kitap && miknatis) {
            const iframe = document.getElementById('pencere');
            iframe.src = kitap;
            iframe.onload = function() {
                const doc = iframe.contentDocument || iframe.contentWindow.document;

                const stil = doc.createElement('style');
                stil.innerHTML = `
                    body { font-size: 20px !important; line-height: 1.6 !important; word-wrap: break-word !important; padding: 10px !important; }
                    div, section, article, p, span, details { display: block !important; height: auto !important; max-height: none !important; visibility: visible !important; opacity: 1 !important; overflow: visible !important; }
                    mark { background: yellow !important; color: black !important; font-weight: bold; }
                `;
                doc.head.appendChild(stil);

                const bodyMetni = doc.body.innerHTML;
                const nerede = bodyMetni.indexOf(miknatis);
                
                if (nerede !== -1) {
                    let oncesi = bodyMetni.substring(0, nerede);
                    let parca = bodyMetni.substring(nerede, nerede + 400); 
                    let sonrasi = bodyMetni.substring(nerede + 400);

                    kelimeler.forEach(k => {
                        const reg = new RegExp(`(${k})`, "gi");
                        parca = parca.replace(reg, "<mark id='HEDEF_OK'>$1</mark>");
                    });

                    doc.body.innerHTML = oncesi + parca + sonrasi;

                    setTimeout(() => {
                        const hedef = doc.getElementById('HEDEF_OK');
                        if (hedef) {
                            hedef.scrollIntoView({ behavior: 'auto', block: 'center' });
                        }
                    }, 500);
                }
            };
        }
    };
    </script>
</body>
</html>
