<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitap Açılıyor...</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
        iframe { width: 100%; height: 100vh; border: none; background: white; }
    </style>
</head>
<body>
    <iframe id="pencere"></iframe>
    <script>
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const kitap = params.get('kitap');
        const miknatis = params.get('m'); 
        const kelimeler = params.get('k').split(',');

        if (kitap && miknatis) {
            const iframe = document.getElementById('pencere');
            iframe.src = kitap;
            iframe.onload = function() {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Mobilde yazılar okunsun, her yer açılsın
                const stil = doc.createElement('style');
                stil.innerHTML = `
                    body { font-size: 20px !important; }
                    div, p, section, details { display: block !important; visibility: visible !important; opacity: 1 !important; }
                    mark { background: yellow !important; color: black !important; font-weight: bold; }
                `;
                doc.head.appendChild(stil);

                // NOKTA ATIŞI: Sayfada sadece o 30 harflik hedefi bul
                const metin = doc.body.innerHTML;
                const yer = metin.indexOf(miknatis);
                
                if (yer !== -1) {
                    // Hedef bölgeyi işaretle, gerisine dokunma
                    let parca = metin.substring(yer, yer + 400); 
                    kelimeler.forEach(k => {
                        parca = parca.replace(new RegExp(`(${k})`, "gi"), "<mark id='HEDEF'>$1</mark>");
                    });

                    // Sadece o bölgeyi güncelle, böylece aşağıdaki kelimeler boyanmaz
                    doc.body.innerHTML = metin.substring(0, yer) + parca + metin.substring(yer + 400);

                    // Şak diye oraya odakla
                    setTimeout(() => {
                        const el = doc.getElementById('HEDEF');
                        if(el) el.scrollIntoView({ behavior: 'auto', block: 'center' });
                    }, 400);
                }
            };
        }
    };
    </script>
</body>
</html>
